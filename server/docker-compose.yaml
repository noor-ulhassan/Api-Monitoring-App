services:
  postgres:
    image: postgres:15-alpine
    container_name: api-monitoring-postgres
    environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: password
        POSTGRES_DB: api_monitoring
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.postgres.sql:/docker-entrypoint-initdb.d/init.postgres.sql
    ports:
      - "5432:5432"
    networks:
      - api-monitoring-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
  
  # mongodb service
  mongo:
    image: mongo:6.0
    container_name: api-monitoring-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - api-monitoring-network
    restart: unless-stopped

# Rabbit MQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: api-monitoring-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: 12345
      RABBITMQ_DEFAULT_VHOST: api_monitoring
    ports:
      - "5672:5672" #AMQP PORT
      - "15672:15672" # management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq 
    networks:
      - api-monitoring-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q" , "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s


# PG Admin (Postgress Web UI)
 
  pgadmin:
    image: dpage/pgadmin4:7
    container_name: api-monitoring-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80" #management UI
    networks:
      - api-monitoring-network
    restart: unless-stopped
    depends_on:
      - postgres

volumes:
  
  postgres_data:
   driver: local
  rabbitmq_data:
   driver: local
  pgadmin_data:
   driver: local
  mongo_data:
   driver: local

networks:
  api-monitoring-network:
   driver: bridge